version: "3.8"
 
services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dockerdb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
 
  spring-app:
    build: .
    container_name: spring-container
    ports:
      - "8900:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: always
 
